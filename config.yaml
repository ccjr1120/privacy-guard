# Detection interval (seconds)
check_interval: 0.5

# Consecutive absence threshold before locking (prevents accidental triggers)
absence_threshold: 3

# Enable auto-unlock (experimental feature)
auto_unlock: false

# Auto-unlock confidence threshold (0-1)
unlock_confidence: 0.8

# Camera index (0 is default camera)
camera_index: 0

# Debug mode (shows camera feed)
debug: false

# Mac lock command
lock_command: "osascript -e 'tell application \"System Events\" to keystroke \"q\" using {control down, command down}'"

# Face detection parameters
face_detection:
  # Scale factor
  scale_factor: 1.1
  # Minimum neighbors
  min_neighbors: 5
  # Minimum face size
  min_size: [100, 100]
